{% load static %}

<link rel="stylesheet" href="{% static 'polls/style.css' %}">

<h2>Neue Umfrage erstellen</h2>

<form method="post">
    {% csrf_token %}

    <h3>Frage</h3>
    <div>
        {{ question_form.as_p }}
    </div>

    <h3>Antwortmöglichkeiten</h3>
    <div id="formset-container">
        {{ formset.management_form }}

        {% for form in formset %}
            <div class="formset-form">
                {{ form.as_p }}
            </div>
        {% endfor %}
    </div>

    <button type="submit">Frage erstellen</button>
    <a href="{% url 'polls:index' %}">Zurück</a>
</form>

<style>
    form {
        max-width: 600px;
        margin: 20px auto;
        font-family: Arial, sans-serif;
    }

    h2, h3 {
        color: #333;
    }

    input[type="text"],
    textarea {
        width: 100%;
        padding: 10px;
        margin: 5px 0 15px 0;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
    }

    button {
        background-color: #008CBA;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin-right: 10px;
    }

    button:hover {
        background-color: #007399;
    }

    a {
        display: inline-block;
        padding: 10px 20px;
        background-color: #666;
        color: white;
        text-decoration: none;
        border-radius: 4px;
    }

    a:hover {
        background-color: #555;
    }

    .formset-form {
        margin-bottom: 15px;
        padding: 10px;
        background-color: #f9f9f9;
        border-radius: 4px;
    }

    label {
        display: block;
        margin-top: 10px;
    }

    .errorlist {
        color: red;
        margin-bottom: 10px;
    }
</style>
