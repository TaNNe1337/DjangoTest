version: '3.9'

services:
  web:
    image: ghcr.io/se-team-e1/djangotest:1.0.7
    expose:
      - "8000"
    volumes:
      - ./staticfiles:/app/staticfiles
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "8001:8001"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
    restart: unless-stopped

